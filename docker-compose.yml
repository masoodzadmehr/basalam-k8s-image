version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: library-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: library
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library123
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
