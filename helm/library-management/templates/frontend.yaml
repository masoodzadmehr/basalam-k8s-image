apiVersion: v1
kind: Service
metadata:
  name: {{ include "library-management.fullname" . }}-frontend
  labels:
    app: {{ include "library-management.name" . }}
spec:
  type: {{ .Values.service.frontend.type }}
  ports:
    - port: {{ .Values.service.frontend.port }}
      targetPort: 80
  selector:
    app: {{ include "library-management.name" . }}
    component: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "library-management.fullname" . }}-frontend
  labels:
    app: {{ include "library-management.name" . }}
    component: frontend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "library-management.name" . }}
      component: frontend
  template:
    metadata:
      labels:
        app: {{ include "library-management.name" . }}
        component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
          imagePullPolicy: {{ .Values.image.frontend.pullPolicy }}
          ports:
            - containerPort: 80
          resources:
            {{- toYaml .Values.resources.frontend | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
