{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "library-management.fullname" . }}-postgres-pvc
  labels:
    app: {{ include "library-management.name" . }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgresql.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "library-management.fullname" . }}-postgres
  labels:
    app: {{ include "library-management.name" . }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: {{ include "library-management.name" . }}
    component: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "library-management.fullname" . }}-postgres
  labels:
    app: {{ include "library-management.name" . }}
    component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "library-management.name" . }}
      component: postgres
  template:
    metadata:
      labels:
        app: {{ include "library-management.name" . }}
        component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgresql.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "library-management.fullname" . }}-postgres
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "library-management.fullname" . }}-postgres
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "library-management.fullname" . }}-postgres
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "library-management.fullname" . }}-postgres-pvc
{{- end }}
