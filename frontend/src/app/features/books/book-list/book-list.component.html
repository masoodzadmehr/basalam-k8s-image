<div class="book-list-container">
  <div class="header-row">
    <h1>Books</h1>
    @if (canManage()) {
      <button mat-flat-button color="primary" routerLink="/books/new">
        <mat-icon>add</mat-icon> Add Book
      </button>
    }
  </div>

  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search books</mat-label>
    <input matInput [formControl]="searchControl" placeholder="Title, author, or ISBN" />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  @if (loading()) {
    <div class="loading-container">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  } @else if (books().length === 0) {
    <mat-card class="empty-card">
      <mat-card-content>No books found.</mat-card-content>
    </mat-card>
  } @else {
    <mat-card class="table-card">
      <table mat-table [dataSource]="books()" class="book-table">
        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef>Title</th>
          <td mat-cell *matCellDef="let book" class="clickable" (click)="onRowClick(book)">{{ book.title }}</td>
        </ng-container>
        <ng-container matColumnDef="author">
          <th mat-header-cell *matHeaderCellDef>Author</th>
          <td mat-cell *matCellDef="let book">{{ book.author }}</td>
        </ng-container>
        <ng-container matColumnDef="isbn">
          <th mat-header-cell *matHeaderCellDef>ISBN</th>
          <td mat-cell *matCellDef="let book">{{ book.isbn }}</td>
        </ng-container>
        <ng-container matColumnDef="availableCopies">
          <th mat-header-cell *matHeaderCellDef>Available</th>
          <td mat-cell *matCellDef="let book">
            <mat-chip [color]="getStatusColor(book.availableCopies)" highlighted>
              {{ book.availableCopies }}
            </mat-chip>
          </td>
        </ng-container>
        <ng-container matColumnDef="copiesCount">
          <th mat-header-cell *matHeaderCellDef>Total</th>
          <td mat-cell *matCellDef="let book">{{ book.copiesCount }}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let book">
            <button mat-icon-button (click)="onRowClick(book); $event.stopPropagation()" aria-label="View details">
              <mat-icon>visibility</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns" (click)="onRowClick(row)"></tr>
      </table>
      <mat-paginator
        [length]="totalElements()"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [pageSizeOptions]="[5, 10, 20, 50]"
        (page)="onPageChange($event)">
      </mat-paginator>
    </mat-card>
  }
</div>
