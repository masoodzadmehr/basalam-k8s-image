<mat-sidenav-container class="layout-container">
  <mat-sidenav mode="side" opened class="sidebar">
    <div class="sidebar-header">
      <mat-icon class="logo-icon">local_library</mat-icon>
      <span class="logo-text">Library MS</span>
    </div>
    <mat-divider></mat-divider>
    <mat-nav-list>
      @for (item of filteredNavItems; track item.label) {
        <a
          mat-list-item
          [routerLink]="[item.route]"
          routerLinkActive="active-link"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="topbar">
      <span class="app-title">Library Management System</span>
      <span class="spacer"></span>

      <button
        mat-icon-button
        [matBadge]="unreadNotifications"
        matBadgeColor="warn"
        matBadgeHidden="unreadNotifications === 0"
        (click)="navigateTo('/notifications')"
        aria-label="Notifications"
      >
        <mat-icon>notifications</mat-icon>
      </button>

      <button
        mat-icon-button
        [matMenuTriggerFor]="userMenu"
        aria-label="User menu"
      >
        <mat-icon>account_circle</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu">
        <button mat-menu-item (click)="navigateTo('/profile')">
          <mat-icon>person</mat-icon>
          <span>Profile</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
