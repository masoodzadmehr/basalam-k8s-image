<!-- Mobile sidebar overlay -->
@if (sidebarOpen) {
  <div class="fixed inset-0 z-40 lg:hidden" (click)="closeSidebar()">
    <div class="absolute inset-0 bg-ink/30 backdrop-blur-sm"></div>
  </div>
}

<div class="flex h-screen overflow-hidden bg-page">
  <!-- Sidebar -->
  <aside
    class="fixed inset-y-0 right-0 z-50 w-64 transform bg-surface border-l border-border
           flex flex-col transition-transform duration-200 ease-out
           lg:relative lg:translate-x-0"
    [class.translate-x-full]="!sidebarOpen"
  >
    <!-- Sidebar header — Printer's mark -->
    <div class="flex items-center gap-3 px-5 h-16 shrink-0 border-b border-border">
      <div class="w-9 h-9 rounded-md bg-ink flex items-center justify-center text-white text-sm font-extrabold
                  font-mono tracking-tighter leading-none">
        &#x425;
      </div>
      <div>
        <div class="font-display text-sm font-bold leading-tight text-ink">&#x6A9;&#x62A;&#x627;&#x628;&#x62E;&#x627;&#x646;&#x647;</div>
        <div class="text-[0.625rem] text-ink-muted tracking-widest uppercase leading-tight">Library</div>
      </div>
    </div>

    <!-- Navigation Items — "Table of Contents" style -->
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-0.5">
      @for (item of filteredNavItems; track item.label) {
        <a
          [routerLink]="[item.route]"
          (click)="closeSidebar()"
          class="flex items-center gap-3 px-3 py-2.5 rounded-r-md text-sm font-medium
                 transition-colors duration-100 cursor-pointer border-r-[3px]"
          [ngClass]="{
            'bg-page text-ink border-r-accent': isActive(item.route),
            'text-ink-light hover:text-ink hover:bg-page border-r-transparent': !isActive(item.route)
          }"
        >
          <span class="text-base leading-none w-5 text-center">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <!-- Sidebar footer -->
    <div class="px-5 py-3 border-t border-border">
      <span class="text-[0.6875rem] text-ink-muted tracking-wide uppercase">
        {{ userRole() }}
      </span>
    </div>
  </aside>

  <!-- Main content area -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Top bar -->
    <header class="h-16 bg-surface border-b border-border flex items-center justify-between px-4 shrink-0 z-30">
      <div class="flex items-center gap-3">
        <!-- Hamburger toggle -->
        <button
          class="lg:hidden p-2 rounded-md hover:bg-page transition-colors text-ink-light"
          (click)="toggleSidebar()"
          aria-label="Toggle sidebar"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <h1 class="font-display text-base font-bold text-ink hidden sm:block">
          Library Management System
        </h1>
      </div>

      <div class="flex items-center gap-1">
        <!-- Notifications -->
        <button
          class="relative p-2 rounded-md hover:bg-page transition-colors text-ink-light"
          (click)="navigateTo('/notifications')"
          aria-label="Notifications"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          @if (unreadNotifications > 0) {
            <span class="absolute top-1 right-1 flex items-center justify-center min-w-[1.125rem] h-[1.125rem]
                         bg-accent text-white text-[0.625rem] font-bold rounded-full px-1">
              {{ unreadNotifications > 99 ? '99+' : unreadNotifications }}
            </span>
          }
        </button>

        <!-- User menu -->
        <div class="relative">
          <button
            class="flex items-center gap-2 p-2 rounded-md hover:bg-page transition-colors text-ink-light"
            (click)="toggleUserMenu()"
            aria-label="User menu"
          >
            <div class="w-7 h-7 rounded-full bg-neutral-subtle flex items-center justify-center text-xs font-bold text-ink-light">
              &#x1F464;
            </div>
          </button>
          @if (userMenuOpen) {
            <div class="absolute left-0 top-full mt-1 w-48 bg-surface rounded-md shadow-lg
                        border border-border py-1 z-50">
              <button
                class="w-full text-left px-4 py-2 text-sm text-ink-light hover:bg-page
                       hover:text-ink flex items-center gap-2 transition-colors"
                (click)="navigateTo('/profile'); userMenuOpen = false"
              >
                <span class="text-sm">&#x1F464;</span> Profile
              </button>
              <hr class="border-border my-0.5" />
              <button
                class="w-full text-left px-4 py-2 text-sm text-accent hover:bg-accent-subtle
                       flex items-center gap-2 transition-colors font-medium"
                (click)="logout()"
              >
                <span class="text-sm">&#x1F6AA;</span> Logout
              </button>
            </div>
          }
          <!-- Click away to close -->
          @if (userMenuOpen) {
            <div class="fixed inset-0 z-40" (click)="userMenuOpen = false"></div>
          }
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto">
      <div class="p-4 sm:p-6 lg:p-8">
        <router-outlet></router-outlet>
      </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-border px-6 py-3 text-[0.6875rem] text-ink-muted shrink-0
                    flex items-center justify-between">
      <span>&copy; 2026 Library Management System</span>
      <span class="font-mono text-[0.625rem]">v1.0</span>
    </footer>
  </div>
</div>
